<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Business Leads Diary</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --danger: #dc2626;
      --ok: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { margin: 0; color: var(--muted); }
    .row { display: grid; gap: 8px; margin-top: 10px; }
    input, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px;
      font-size: 14px;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      border: none;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      font-weight: 600;
    }
    .btn-delete { background: var(--danger); }
    .btn-call { background: var(--ok); }
    .btn-wa { background: #25D366; }
    .lead-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .status { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .hidden { display: none; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .logout { width:auto; padding:8px 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginBox" class="card">
      <h1>Leads Diary Login</h1>
      <p>Enter password to access your leads.</p>
      <div class="row">
        <input id="password" type="password" placeholder="Password" />
        <button id="loginBtn">Login</button>
        <div id="loginMsg" class="status"></div>
      </div>
    </div>

    <div id="app" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>Personal Business Leads Diary</h1>
            <p>Add lead and edit fields inline (auto-save on blur).</p>
          </div>
          <button id="logoutBtn" class="logout btn-delete">Logout</button>
        </div>
        <div class="row">
          <input id="newName" placeholder="Name" />
          <input id="newPurpose" placeholder="Purpose" />
          <input id="newPhone" placeholder="Phone Number" />
          <textarea id="newNote" placeholder="Short Note"></textarea>
          <button id="addBtn">Add Lead</button>
          <div id="msg" class="status"></div>
        </div>
      </div>

      <div id="leadsList"></div>
    </div>
  </div>

  <script>
    const api = 'api.php';
    const loginBox = document.getElementById('loginBox');
    const app = document.getElementById('app');
    const msg = document.getElementById('msg');
    const loginMsg = document.getElementById('loginMsg');

    async function apiCall(action, method = 'GET', body = null) {
      const opts = {
        method,
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' }
      };
      let url = api + '?action=' + encodeURIComponent(action);
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || 'Request failed');
      return data;
    }

    function setMessage(text) {
      msg.textContent = text;
      setTimeout(() => { if (msg.textContent === text) msg.textContent = ''; }, 1500);
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    function leadCard(lead) {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.id = lead.id;
      el.innerHTML = `
        <div class="row">
          <input data-field="name" value="${escapeHtml(lead.name)}" placeholder="Name" />
          <input data-field="purpose" value="${escapeHtml(lead.purpose)}" placeholder="Purpose" />
          <input data-field="phone" value="${escapeHtml(lead.phone)}" placeholder="Phone Number" />
          <textarea data-field="note" placeholder="Short Note">${escapeHtml(lead.note)}</textarea>
        </div>
        <div class="lead-actions">
          <button class="btn-call">Call</button>
          <button class="btn-wa">WhatsApp</button>
          <button class="btn-delete">Delete</button>
        </div>
      `;

      el.querySelectorAll('input[data-field], textarea[data-field]').forEach(input => {
        input.addEventListener('blur', async () => {
          try {
            const payload = {
              id: lead.id,
              name: el.querySelector('[data-field="name"]').value,
              purpose: el.querySelector('[data-field="purpose"]').value,
              phone: el.querySelector('[data-field="phone"]').value,
              note: el.querySelector('[data-field="note"]').value
            };
            await apiCall('save', 'POST', payload);
            setMessage('Saved');
          } catch (e) {
            setMessage('Save failed: ' + e.message);
          }
        });
      });

      el.querySelector('.btn-call').addEventListener('click', () => {
        const phone = el.querySelector('[data-field="phone"]').value.trim();
        if (!phone) return alert('Please enter phone number first.');
        window.location.href = 'tel:' + phone;
      });

      el.querySelector('.btn-wa').addEventListener('click', () => {
        const phone = el.querySelector('[data-field="phone"]').value.trim();
        if (!phone) return alert('Please enter phone number first.');
        window.open('https://wa.me/' + encodeURIComponent(phone), '_blank');
      });

      el.querySelector('.btn-delete').addEventListener('click', async () => {
        if (!confirm('Are you sure you want to delete this lead?')) return;
        try {
          await apiCall('delete', 'POST', { id: lead.id });
          el.remove();
          setMessage('Lead deleted');
        } catch (e) {
          setMessage('Delete failed: ' + e.message);
        }
      });

      return el;
    }

    async function loadLeads() {
      const list = document.getElementById('leadsList');
      list.innerHTML = '';
      const data = await apiCall('load');
      data.leads.forEach(lead => list.appendChild(leadCard(lead)));
    }

    async function checkSession() {
      try {
        await apiCall('check');
        loginBox.classList.add('hidden');
        app.classList.remove('hidden');
        await loadLeads();
      } catch {
        loginBox.classList.remove('hidden');
        app.classList.add('hidden');
      }
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      try {
        await apiCall('login', 'POST', { password });
        loginMsg.textContent = '';
        document.getElementById('password').value = '';
        await checkSession();
      } catch (e) {
        loginMsg.textContent = 'Login failed: ' + e.message;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiCall('logout', 'POST', {});
      await checkSession();
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const payload = {
        name: document.getElementById('newName').value,
        purpose: document.getElementById('newPurpose').value,
        phone: document.getElementById('newPhone').value,
        note: document.getElementById('newNote').value
      };
      if (!payload.name && !payload.phone) {
        setMessage('Enter at least Name or Phone.');
        return;
      }
      try {
        await apiCall('save', 'POST', payload);
        document.getElementById('newName').value = '';
        document.getElementById('newPurpose').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newNote').value = '';
        await loadLeads();
        setMessage('Lead added');
      } catch (e) {
        setMessage('Add failed: ' + e.message);
      }
    });

    checkSession();
  </script>
</body>
</html>
